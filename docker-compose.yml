version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zipzop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zipzoppass}
      POSTGRES_DB: ${POSTGRES_DB:-zipzop}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zipzop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    restart: on-failure
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - ./data:/data
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: ["node", "src/worker.js"]
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./data:/data
    depends_on:
      - redis
      - postgres

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:3000
    volumes:
      - ./client:/client
    working_dir: /client

volumes:
  pg-data:
